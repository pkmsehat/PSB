<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sejarah - Puskesmas Sehat Bersama</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; color: #1e293b; scroll-behavior: smooth; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
    
    header { background: white; box-shadow: 0 1px 3px #0001; position: sticky; top: 0; z-index: 9999; }
    .nav { display: flex; justify-content: space-between; align-items: center; height: 70px; }
    .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; color: #047857; text-decoration: none; }
    .logo img { width: 40px; height: 40px; object-fit: contain; }
    .nav-links { display: flex; gap: 25px; align-items: center; }
    .nav-links a { text-decoration: none; color: #475569; font-weight: 500; transition: 0.2s; }
    .nav-links a:hover { color: #047857; }
    
    .nav-links a, .dropdown-btn { font-size: 0.875rem !important; font-weight: 500; }
    .dropdown-btn { background: none; border: none; color: #475569; cursor: pointer; display: flex; align-items: center; gap: 4px; font-family: inherit; padding: 0; }
    .dropdown { position: relative; padding-bottom: 20px; margin-bottom: -20px; }
    .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: white; min-width: 180px; box-shadow: 0 8px 16px #0002; border-radius: 8px; z-index: 10000; padding: 8px 0; margin-top: 0; }
    .dropdown-content a { color: #475569; padding: 8px 16px; text-decoration: none; display: block; font-size: 0.8125rem !important; font-weight: 400; }
    .dropdown-content a:hover { background: #f1f5f9; color: #047857; }
    .dropdown:hover .dropdown-content, .dropdown-content:hover { display: block; }
    
    .mobile-btn { display: none; background: none; border: none; font-size: 1.5rem; }
    @media (max-width: 768px) {
      .nav-links { display: none; position: absolute; top: 70px; left: 0; right: 0; background: white; flex-direction: column; padding: 20px; box-shadow: 0 4px 6px #0001; gap: 15px; align-items: start; }
      .nav-links.show { display: flex; }
      .mobile-btn { display: block; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a href="index.html" class="logo">
        <img src="logo.png" alt="Logo Puskesmas Sehat Bersama">
        <div>PUSKESMAS SEHAT BERSAMA</div>
      </a>
      
      <nav class="nav-links" id="nav-menu">
        <a href="index.html">Home</a>
        <div class="dropdown">
          <button class="dropdown-btn" style="color:#047857;font-weight:600;">Profil </button>
          <div class="dropdown-content">
            <a href="visi-misi.html" style="color:#047857;font-weight:600;">Visi & Misi</a>
            <a href="sejarah.html">Sejarah</a>
            <a href="struktur.html">Struktur Organisasi</a>
          </div>
        </div>
        <div class="dropdown">
          <button class="dropdown-btn">Layanan </button>
          <div class="dropdown-content">
            <a href="poli-umum.html">Poli Umum</a>
            <a href="poli-gigi.html">Poli Gigi</a>
            <a href="kia.html">KIA/KB</a>
            <a href="daftar.html">Daftar Online</a>
          </div>
        </div>
        <a href="login.html" style="background:#86efac;color:#065f46;padding:8px 14px;border-radius:8px;text-decoration:none;font-weight:600;margin-left:10px;">Login</a>
      </nav>
      <button class="mobile-btn" id="mobile-btn">☰</button>
    </div>
  </header>

  <main class="container py-12">
    <div data-aos="fade-up">
      <div class="flex items-center gap-3 mb-6">
        <i class="fa-solid fa-bullseye text-4xl text-teal-600"></i>
        <h1 class="text-3xl font-bold text-teal-700">Sejarah Puskesmas Sehat Bersama</h1>
      </div>
      <p class="text-gray-600 mb-8 max-w-2xl">.</p>
    </div>

    <div class="bg-gradient-to-br from-teal-600 to-teal-700 p-10 rounded-xl shadow-lg text-white mb-12" data-aos="zoom-in">
      <h2 class="text-sm font-semibold uppercase tracking-wider mb-3 opacity-90"></h2>
      <p class="text-2xl md:text-3xl font-bold leading-relaxed">
      </p>
    </div>

    <div data-aos="fade-up">
      <h2 class="text-2xl font-bold mb-8 text-teal-700"></h2>
      <div class="grid md:grid-cols-2 gap-6">
        <div class="bg-white p-6 rounded-xl shadow-md hover:shadow-xl transition duration-300">
          <div class="flex gap-4">
            <div class="bg-teal-100 text-teal-700 w-12 h-12 rounded-lg flex items-center justify-center font-bold text-xl flex-shrink-0">1</div>
            <div>
              <h3 class="font-bold text-lg mb-2"></h3>
              <p class="text-gray-600 text-sm">.</p>
            </div>
          </div>
        <div class="bg-white p-6 rounded-xl shadow-md hover:shadow-xl transition duration-300">
          <div class="flex gap-4">
            <div class="bg-teal-100 text-teal-700 w-12 h-12 rounded-lg flex items-center justify-center font-bold text-xl flex-shrink-0">2</div>
            <div>
              <h3 class="font-bold text-lg mb-2">Cegah Lebih Baik</h3>
              <p class="text-gray-600 text-sm"></p>
            </div>
          </div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-md hover:shadow-xl transition duration-300">
          <div class="flex gap-4">
            <div class="bg-teal-100 text-teal-700 w-12 h-12 rounded-lg flex items-center justify-center font-bold text-xl flex-shrink-0">3</div>
            <div>
              <h3 class="font-bold text-lg mb-2"></h3>
              <p class="text-gray-600 text-sm"></p>
            </div>
          </div>
        <div class="bg-white p-6 rounded-xl shadow-md hover:shadow-xl transition duration-300">
          <div class="flex gap-4">
            <div class="bg-teal-100 text-teal-700 w-12 h-12 rounded-lg flex items-center justify-center font-bold text-xl flex-shrink-0">4</div>
            <div>
              <h3 class="font-bold text-lg mb-2">Digital Melayani</h3>
              <p class="text-gray-600 text-sm"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <footer class="bg-gray-100 py-8 mt-12">
    <div class="container text-center text-gray-600 text-sm">
      <p>© 2026 Puskesmas Sehat Bersama | Sejarah </p>
    </div>
  </footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init({ duration: 800, once: true });
document.getElementById('mobile-btn').addEventListener('click', function() {
  document.getElementById('nav-menu').classList.toggle('show');
});
</script>
</body>
</html>
